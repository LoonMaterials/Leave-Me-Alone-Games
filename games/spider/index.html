<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f58">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Spider">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Spider Solitaire</title>
    <link rel="manifest" href="../../manifest.webmanifest?v=20260607-app-1">
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260621-controls-1">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="actions">
          <span id="status" class="status" aria-live="polite"></span>
          <a class="button-link" href="../../index.html" data-i18n="gameMenu">Game Menu</a>
          <label class="theme-control" for="theme-select" hidden style="display: none">
            <span data-i18n="background">Background</span>
            <select id="theme-select" aria-label="Game background" data-i18n-aria="gameBackground">
              <option value="green" data-i18n="green">Green</option>
              <option value="blue" data-i18n="blue">Blue</option>
              <option value="grey" data-i18n="grey">Grey</option>
              <option value="orange" data-i18n="orange">Orange</option>
            </select>
          </label>
          <label class="mode-control" for="mode-select">
            <span data-i18n="suitMode">Suit Mode</span>
            <select id="mode-select" aria-label="Spider suit mode" data-i18n-aria="spiderSuitMode">
              <option value="one" data-i18n="oneSuit">One Suit</option>
              <option value="two" data-i18n="twoSuit">Two Suit</option>
              <option value="four" data-i18n="fourSuit">Four Suit</option>
            </select>
          </label>
          <label class="language-control" for="language-select" hidden style="display: none">
            <span data-i18n="language">Language</span>
            <select id="language-select" aria-label="Language" data-i18n-aria="selectLanguage">
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="zh">中文</option>
            </select>
          </label>
          <button id="undo" type="button" disabled data-i18n="undo">Undo</button>
          <button id="new-game" type="button" data-i18n="newGame">New Game</button>
        </div>
      </header>

      <section class="board" aria-label="Spider Solitaire board" data-i18n-aria="boardSpider">
        <div class="upper-row">
          <button id="stock" class="pile stock" type="button" aria-label="Deal from stock" data-i18n-aria="dealFromStock" data-i18n-label="deal"></button>
          <div class="spacer" aria-hidden="true"></div>
          <div id="completed" class="completed" aria-label="Completed runs" data-i18n-aria="completedRuns"></div>
        </div>

        <div id="tableau" class="tableau" aria-label="Tableau piles" data-i18n-aria="tableauPiles"></div>
      </section>

      <div id="win-message" class="win-message" hidden data-i18n="youWon">
        You won.
      </div>
    </main>

    <span hidden data-i18n-title="spiderTitle"></span>
    <script src="../../i18n.js?v=20260627-board-games-1"></script>
    <script src="app.js?v=20260614-spider-4"></script>
  </body>
</html>
