<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f58">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Klondike">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Klondike Solitaire</title>
    <link rel="manifest" href="../../manifest.webmanifest?v=20260607-app-1">
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260621-controls-1">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="actions">
          <span id="status" class="status" aria-live="polite"></span>
          <a class="button-link" href="../../index.html" data-i18n="gameMenu">Game Menu</a>
          <label class="theme-control" for="theme-select" hidden style="display: none">
            <span data-i18n="background">Background</span>
            <select id="theme-select" aria-label="Game background" data-i18n-aria="gameBackground">
              <option value="green" data-i18n="green">Green</option>
              <option value="blue" data-i18n="blue">Blue</option>
              <option value="grey" data-i18n="grey">Grey</option>
              <option value="orange" data-i18n="orange">Orange</option>
            </select>
          </label>
          <label class="language-control" for="language-select" hidden style="display: none">
            <span data-i18n="language">Language</span>
            <select id="language-select" aria-label="Language" data-i18n-aria="selectLanguage">
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="zh">中文</option>
            </select>
          </label>
          <label class="draw-control" for="draw-count">
            <span data-i18n="draw1">Draw 1</span>
            <input id="draw-count" type="range" min="1" max="3" step="2" value="1" aria-label="Cards drawn from stock" data-i18n-aria="cardsDrawnFromStock">
            <span data-i18n="draw3">Draw 3</span>
          </label>
          <button id="undo" type="button" disabled data-i18n="undo">Undo</button>
          <button id="auto-finish" type="button" disabled data-i18n="autoFinish" hidden style="display: none">Auto Finish</button>
          <button id="new-game" type="button" data-i18n="newGame">New Game</button>
        </div>
      </header>

      <section class="board" aria-label="Klondike Solitaire board" data-i18n-aria="boardKlondike">
        <div class="upper-row">
          <div class="draw-area" aria-label="Stock and waste piles" data-i18n-aria="stockWastePiles">
            <button id="stock" class="pile stock" type="button" aria-label="Draw from stock" data-i18n-aria="drawFromStock"></button>
            <div id="waste" class="pile" aria-label="Waste pile" data-i18n-aria="wastePile"></div>
          </div>

          <div id="foundations" class="foundations" aria-label="Foundation piles" data-i18n-aria="foundationPiles"></div>
        </div>

        <div id="tableau" class="tableau" aria-label="Tableau piles" data-i18n-aria="tableauPiles"></div>
      </section>

      <div id="win-message" class="win-message" hidden data-i18n="youWonKlondike">
        You won. Quietly magnificent.
      </div>
    </main>

    <span hidden data-i18n-title="klondikeTitle"></span>
    <script src="../../i18n.js?v=20260627-board-games-1"></script>
    <script src="app.js?v=20260621-auto-finish-1"></script>
  </body>
</html>
