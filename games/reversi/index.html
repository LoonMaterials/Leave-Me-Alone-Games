<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f58">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Reversi">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Reversi That Leaves You Alone</title>
    <link rel="manifest" href="../../manifest.webmanifest?v=20260607-app-1">
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260628-difficulty-1">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="actions">
          <span id="status" class="status" aria-live="polite"></span>
          <label class="difficulty-control">
            <span data-i18n="difficulty">Difficulty</span>
            <select id="difficulty" aria-label="Difficulty" data-i18n-aria="difficulty">
              <option value="easy" data-i18n="difficultyEasy">Easy</option>
              <option value="medium" data-i18n="difficultyMedium">Medium</option>
              <option value="hard" data-i18n="difficultyHard">Hard</option>
            </select>
          </label>
          <a class="button-link" href="../../index.html" data-i18n="gameMenu">Main Menu</a>
          <button id="undo" type="button" disabled data-i18n="undo">Undo</button>
          <button id="new-game" type="button" data-i18n="newGame">New Game</button>
        </div>
      </header>
      <section id="board" class="board" aria-label="Reversi board" data-i18n-aria="boardReversi"></section>
    </main>
    <span hidden data-i18n-title="reversiTitle"></span>
    <script src="../../i18n.js?v=20260628-difficulty-1"></script>
    <script src="app.js?v=20260628-medium-ai-1"></script>
  </body>
</html>
