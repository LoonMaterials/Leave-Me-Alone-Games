<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Peg Solitaire</title>
    <link rel="stylesheet" href="styles.css?v=20260630-game-fixes-1">
  </head>
  <body data-game="peg-solitaire">
    <header class="topbar">
      <a class="control-button" href="../../index.html" data-i18n="gameMenu">Main Menu</a>
      <h1 data-i18n="pegSolitaireTitle">Peg Solitaire</h1>
      <div class="controls">
        <button id="check-button" type="button" data-i18n="checkPuzzle">Check</button>
        <button id="undo-button" type="button" data-i18n="undo">Undo</button>
        <button id="new-game-button" type="button" data-i18n="newGame">New Game</button>
      </div>
    </header>
    <main class="game-shell">
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <section id="game-board" class="board" aria-label="Peg Solitaire board" data-i18n-aria="boardPegSolitaire"></section>
    </main>
    <span hidden data-i18n-title="pegSolitaireTitle"></span>
    <script src="../../i18n.js?v=20260630-game-fixes-1"></script>
    <script src="app.js?v=20260630-game-fixes-1"></script>
  </body>
</html>
