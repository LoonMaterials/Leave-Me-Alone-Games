<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f58">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pyramid">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pyramid Solitaire</title>
    <link rel="manifest" href="../../manifest.webmanifest?v=20260607-app-1">
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260614-pyramid-1">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="title-block">
          <h1>Pyramid Solitaire</h1>
          <p>No ads. No accounts. No noise.</p>
        </div>
        <div class="actions">
          <span id="status" class="status" aria-live="polite"></span>
          <label class="theme-control" for="theme-select">
            <span>Background</span>
            <select id="theme-select" aria-label="Game background">
              <option value="green">Green</option>
              <option value="blue">Blue</option>
              <option value="grey">Grey</option>
              <option value="orange">Orange</option>
            </select>
          </label>
          <a class="button-link" href="../../index.html">Game Menu</a>
          <button id="undo" type="button" disabled>Undo</button>
          <button id="new-game" type="button">New Game</button>
        </div>
      </header>

      <section class="board" aria-label="Pyramid Solitaire board">
        <div id="pyramid" class="pyramid" aria-label="Pyramid cards"></div>

        <div class="lower-row">
          <button id="stock" class="pile stock" type="button" aria-label="Draw from stock"></button>
          <button id="waste" class="pile waste" type="button" aria-label="Waste pile"></button>
          <div class="spacer" aria-hidden="true"></div>
          <div id="removed" class="pile removed" aria-label="Removed cards"></div>
        </div>
      </section>

      <div id="win-message" class="win-message" hidden>
        You won.
      </div>
    </main>

    <script src="app.js?v=20260614-pyramid-1"></script>
  </body>
</html>
