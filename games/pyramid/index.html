<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f58">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pyramid">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pyramid Solitaire</title>
    <link rel="manifest" href="../../manifest.webmanifest?v=20260607-app-1">
    <link rel="apple-touch-icon" href="../../icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260617-menu-1">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="title-block">
          <h1 data-i18n="pyramidTitle">Pyramid Solitaire</h1>
          <p data-i18n="noNoise">No ads. No accounts. No noise.</p>
        </div>
        <div class="actions">
          <span id="status" class="status" aria-live="polite"></span>
          <a class="button-link" href="../../index.html" data-i18n="gameMenu">Game Menu</a>
          <label class="theme-control" for="theme-select">
            <span data-i18n="background">Background</span>
            <select id="theme-select" aria-label="Game background" data-i18n-aria="gameBackground">
              <option value="green" data-i18n="green">Green</option>
              <option value="blue" data-i18n="blue">Blue</option>
              <option value="grey" data-i18n="grey">Grey</option>
              <option value="orange" data-i18n="orange">Orange</option>
            </select>
          </label>
          <label class="language-control" for="language-select">
            <span data-i18n="language">Language</span>
            <select id="language-select" aria-label="Language" data-i18n-aria="selectLanguage">
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="zh">Mandarin</option>
            </select>
          </label>
          <button id="undo" type="button" disabled data-i18n="undo">Undo</button>
          <button id="new-game" type="button" data-i18n="newGame">New Game</button>
        </div>
      </header>

      <section class="board" aria-label="Pyramid Solitaire board" data-i18n-aria="boardPyramid">
        <div id="pyramid" class="pyramid" aria-label="Pyramid cards" data-i18n-aria="pyramidCards"></div>

        <div class="lower-row">
          <button id="stock" class="pile stock" type="button" aria-label="Draw from stock" data-i18n-aria="drawFromStock" data-i18n-label="draw"></button>
          <button id="waste" class="pile waste" type="button" aria-label="Waste pile" data-i18n-aria="wastePile" data-i18n-label="waste"></button>
          <div class="spacer" aria-hidden="true"></div>
          <div id="removed" class="pile removed" aria-label="Removed cards" data-i18n-aria="removedCards"></div>
        </div>
      </section>

      <div id="win-message" class="win-message" hidden data-i18n="youWon">
        You won.
      </div>
    </main>

    <span hidden data-i18n-title="pyramidTitle"></span>
    <script src="../../i18n.js?v=20260616-i18n-5"></script>
    <script src="app.js?v=20260614-pyramid-2"></script>
  </body>
</html>
